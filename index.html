<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イジンデン カード検索</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>イジンデン カード検索</h1>

  <div id="search-area">
    <input id="名称" placeholder="名称で検索">
    <input id="カード番号" placeholder="カード番号で検索">
    <input id="レアリティ" placeholder="レアリティで検索 (C/R/SR/UR)">
    <input id="色" placeholder="色で検索 (赤/青/緑)">
    <input id="種別" placeholder="種別で検索 (イシン/兵器/地形など)">
    <input id="レベル" placeholder="レベルで検索 (数値)">
    <input id="魔力コスト" placeholder="魔力コストで検索 (数値)">
    <input id="パワー" placeholder="パワーで検索 (数値)">
    <input id="特性" placeholder="特性で検索 (部分一致)">
    <input id="ルールテキスト" placeholder="ルールテキストで検索 (部分一致)">
    <input id="検索タグ" placeholder="タグで検索 (部分一致)">
    <button id="searchBtn">検索</button>
    <button id="resetBtn">リセット</button>
  </div>

  <div id="result"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="script.js"></script>
</body>
</html>
